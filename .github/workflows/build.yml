name: بناء صلاتك

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: تحميل الكود
      uses: actions/checkout@v4

    - name: إعداد Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: تحميل apktool
      run: |
        curl -L -o /tmp/apktool.jar \
          https://github.com/iBotPeaches/Apktool/releases/download/v2.11.0/apktool_2.11.0.jar

    - name: فك تجميع الـ APK
      run: |
        java -jar /tmp/apktool.jar d -f صلاتك_4.1.1.apk -o /tmp/apk-output

    - name: إعادة بناء الـ APK
      run: |
        java -jar /tmp/apktool.jar b /tmp/apk-output -o /tmp/app-unsigned.apk

    - name: توقيع الـ APK
      run: |
        jarsigner -keystore signing/release.keystore \
          -storepass Salatak123 -keypass Salatak123 \
          -sigalg SHA256withRSA -digestalg SHA-256 \
          /tmp/app-unsigned.apk salatak
        mv /tmp/app-unsigned.apk /tmp/Salatak.apk

    - name: إنشاء Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v4.1.1-build-${{ github.run_number }}
        name: "صلاتك v4.1.1 (Build ${{ github.run_number }})"
        body: |
          ## 🕌 صلاتك - مواقيت الصلاة

          **الإصدار:** 4.1.1
          **تاريخ البناء:** $(date +%Y-%m-%d)

          ### 📱 المميزات:
          - مواقيت الصلاة بدقة
          - اتجاه القبلة
          - الأذكار والتسبيح
          - القرآن الكريم
          - الراديو الإسلامي

          ### ⚠️ ملاحظة التثبيت:
          احذف التطبيق القديم أولاً ثم ثبّت هذا (مفتاح توقيع مختلف عن الأصلي)

          ### 📥 التحميل:
          - `Salatak.apk` ← التطبيق جاهز للتثبيت
        files: |
          /tmp/Salatak.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
